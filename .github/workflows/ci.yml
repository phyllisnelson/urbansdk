name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8 isort
      - run: flake8 app tests
      - run: isort --check-only app tests

  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: urbansdk
          POSTGRES_PASSWORD: urbansdk
          POSTGRES_DB: urbansdk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U urbansdk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://urbansdk:urbansdk@localhost:5432/urbansdk

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt -r requirements.local.txt
      - run: pytest tests/ --ignore=tests/integration -q
