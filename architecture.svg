<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <style>
      .title { font: 700 28px 'Arial', sans-serif; fill: #1f2937; }
      .box-title { font: 700 20px 'Arial', sans-serif; fill: #111827; }
      .box-text { font: 400 16px 'Arial', sans-serif; fill: #374151; }
      .small { font: 400 14px 'Arial', sans-serif; fill: #4b5563; }
      .arrow-text { font: 600 14px 'Arial', sans-serif; fill: #1f2937; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="#f8fafc"/>
  <text x="640" y="50" text-anchor="middle" class="title">Traffic Speed Microservice Architecture</text>

  <rect x="360" y="90" rx="14" ry="14" width="560" height="110" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="640" y="130" text-anchor="middle" class="box-title">Jupyter Notebook + MapboxGL</text>
  <text x="640" y="158" text-anchor="middle" class="box-text">requests -> /aggregates/ -> GeoJSON -> map visualization</text>
  <text x="640" y="182" text-anchor="middle" class="small">notebook.ipynb</text>

  <rect x="280" y="280" rx="14" ry="14" width="720" height="170" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="640" y="320" text-anchor="middle" class="box-title">FastAPI Service</text>
  <text x="640" y="348" text-anchor="middle" class="box-text">GET /aggregates/ | GET /aggregates/{link_id}</text>
  <text x="640" y="374" text-anchor="middle" class="box-text">POST /aggregates/spatial_filter/ | GET /patterns/slow_links/</text>
  <text x="640" y="400" text-anchor="middle" class="small">app/main.py, app/api/*, app/schemas/*, app/periods.py</text>
  <text x="640" y="424" text-anchor="middle" class="small">SQLAlchemy ORM query layer + GeoJSON responses</text>

  <rect x="120" y="540" rx="14" ry="14" width="500" height="150" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="370" y="578" text-anchor="middle" class="box-title">PostgreSQL + PostGIS</text>
  <text x="370" y="605" text-anchor="middle" class="box-text">links (geometry), speed_records (timestamp, speed, day_of_week)</text>
  <text x="370" y="631" text-anchor="middle" class="box-text">Spatial filtering + temporal aggregation</text>
  <text x="370" y="656" text-anchor="middle" class="small">app/database/models.py, app/database/connection.py</text>

  <rect x="670" y="540" rx="14" ry="14" width="490" height="150" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="915" y="578" text-anchor="middle" class="box-title">Data Ingestion Pipeline</text>
  <text x="915" y="605" text-anchor="middle" class="box-text">link_info.parquet.gz + duval_jan1_2024.parquet.gz</text>
  <text x="915" y="631" text-anchor="middle" class="box-text">migrate -> load links -> load speed records</text>
  <text x="915" y="656" text-anchor="middle" class="small">app/ingest.py, app/database/migrate.py</text>

  <line x1="640" y1="200" x2="640" y2="278" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="654" y="245" class="arrow-text">HTTP JSON / GeoJSON</text>

  <line x1="480" y1="450" x2="405" y2="538" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="352" y="498" class="arrow-text">ORM + SQL</text>

  <line x1="790" y1="450" x2="865" y2="538" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="840" y="500" class="arrow-text">bulk load</text>

  <line x1="770" y1="615" x2="620" y2="615" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="685" y="600" text-anchor="middle" class="arrow-text">COPY / UPSERT</text>
</svg>
