<svg xmlns="http://www.w3.org/2000/svg" width="700" height="860" viewBox="0 0 700 860" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="860" fill="#f8fafc"/>

  <!-- Title -->
  <text x="350" y="44" text-anchor="middle"
        font-size="20" font-weight="700" fill="#0f172a"
        letter-spacing="0.5">Traffic Speed Microservice</text>

  <!-- ── Jupyter Notebook ── -->
  <rect x="80" y="70" width="540" height="120" rx="12"
        fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="80" y="70" width="540" height="38" rx="12" fill="#3b82f6"/>
  <rect x="80" y="96" width="540" height="12" fill="#3b82f6"/>
  <text x="350" y="95" text-anchor="middle"
        font-size="14" font-weight="700" fill="#ffffff">Jupyter Notebook</text>
  <text x="350" y="132" text-anchor="middle"
        font-size="13" fill="#1e40af">notebook.ipynb · requests · MapboxGL LinestringViz</text>
  <text x="350" y="154" text-anchor="middle"
        font-size="12" fill="#3b82f6">Colored road segments by average speed · hover popup with segment info</text>

  <!-- Arrow: Notebook → FastAPI -->
  <line x1="350" y1="190" x2="350" y2="228"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <rect x="222" y="196" width="156" height="22" rx="4" fill="#f1f5f9"/>
  <text x="350" y="211" text-anchor="middle"
        font-size="11" fill="#475569" font-weight="600">HTTP · JSON + GeoJSON</text>

  <!-- ── FastAPI ── -->
  <rect x="80" y="230" width="540" height="180" rx="12"
        fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="80" y="230" width="540" height="38" rx="12" fill="#22c55e"/>
  <rect x="80" y="256" width="540" height="12" fill="#22c55e"/>
  <text x="350" y="255" text-anchor="middle"
        font-size="14" font-weight="700" fill="#ffffff">FastAPI  ·  port 8000</text>

  <!-- endpoint rows -->
  <text x="160" y="296" font-size="12" fill="#166534" font-weight="600">GET</text>
  <text x="200" y="296" font-size="12" fill="#374151">/aggregates/</text>
  <text x="450" y="296" font-size="12" fill="#6b7280">avg speed per link</text>

  <text x="160" y="318" font-size="12" fill="#166534" font-weight="600">GET</text>
  <text x="200" y="318" font-size="12" fill="#374151">/aggregates/{link_id}</text>
  <text x="450" y="318" font-size="12" fill="#6b7280">single segment detail</text>

  <text x="148" y="340" font-size="12" fill="#1d4ed8" font-weight="600">POST</text>
  <text x="200" y="340" font-size="12" fill="#374151">/aggregates/spatial_filter/</text>
  <text x="450" y="340" font-size="12" fill="#6b7280">bbox intersection</text>

  <text x="160" y="362" font-size="12" fill="#166534" font-weight="600">GET</text>
  <text x="200" y="362" font-size="12" fill="#374151">/patterns/slow_links/</text>
  <text x="450" y="362" font-size="12" fill="#6b7280">consistently slow links</text>

  <text x="350" y="394" text-anchor="middle"
        font-size="11" fill="#4ade80">app/api/  ·  app/schemas/  ·  app/enums.py  ·  app/settings.py</text>

  <!-- Arrow: FastAPI → PostgreSQL -->
  <line x1="350" y1="410" x2="350" y2="448"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <rect x="237" y="416" width="126" height="22" rx="4" fill="#f1f5f9"/>
  <text x="350" y="431" text-anchor="middle"
        font-size="11" fill="#475569" font-weight="600">SQLAlchemy ORM</text>

  <!-- ── PostgreSQL + PostGIS ── -->
  <rect x="80" y="450" width="540" height="170" rx="12"
        fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="80" y="450" width="540" height="38" rx="12" fill="#f97316"/>
  <rect x="80" y="476" width="540" height="12" fill="#f97316"/>
  <text x="350" y="475" text-anchor="middle"
        font-size="14" font-weight="700" fill="#ffffff">PostgreSQL + PostGIS  ·  port 5432</text>

  <text x="160" y="514" font-size="12" fill="#9a3412" font-weight="600">links</text>
  <text x="230" y="514" font-size="12" fill="#374151">link_id PK  ·  road_name  ·  geometry (GEOMETRY/4326)</text>

  <text x="160" y="536" font-size="12" fill="#9a3412" font-weight="600">speed_records</text>
  <text x="270" y="536" font-size="12" fill="#374151">link_id FK  ·  timestamp  ·  speed  ·  day_of_week</text>

  <line x1="160" y1="548" x2="540" y2="548" stroke="#fed7aa" stroke-width="1"/>

  <text x="160" y="568" font-size="12" fill="#6b7280">Index</text>
  <text x="200" y="568" font-size="12" fill="#374151">(day_of_week, link_id)  — fast period/day queries</text>

  <text x="350" y="600" text-anchor="middle"
        font-size="11" fill="#fb923c">app/database/models.py  ·  app/database/migrate.py</text>

  <!-- Arrow: Ingestion → PostgreSQL -->
  <line x1="350" y1="690" x2="350" y2="622"
        stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <rect x="213" y="646" width="175" height="22" rx="4" fill="#f1f5f9"/>
  <text x="350" y="661" text-anchor="middle"
        font-size="11" fill="#475569" font-weight="600">PostgreSQL COPY / upsert</text>

  <!-- ── Data Ingestion ── -->
  <rect x="80" y="692" width="540" height="140" rx="12"
        fill="#faf5ff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="80" y="692" width="540" height="38" rx="12" fill="#a855f7"/>
  <rect x="80" y="718" width="540" height="12" fill="#a855f7"/>
  <text x="350" y="717" text-anchor="middle"
        font-size="14" font-weight="700" fill="#ffffff">Data Ingestion</text>

  <text x="350" y="754" text-anchor="middle"
        font-size="12" fill="#374151">link_info.parquet.gz  →  links table</text>
  <text x="350" y="776" text-anchor="middle"
        font-size="12" fill="#374151">duval_jan1_2024.parquet.gz  →  speed_records  (100k+ rows)</text>

  <text x="350" y="810" text-anchor="middle"
        font-size="11" fill="#c084fc">app/ingest.py  ·  Ingester class  ·  make ingest</text>
</svg>
