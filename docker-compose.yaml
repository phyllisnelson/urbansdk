services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: urbansdk
      POSTGRES_PASSWORD: urbansdk
      POSTGRES_DB: urbansdk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbansdk"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://urbansdk:urbansdk@db:5432/urbansdk
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__

volumes:
  pgdata:
